<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>野球スコアブック（ワンタップ記録版）</title>
    <style>
        body { font-family: sans-serif; padding: 10px; padding-bottom: 100px; background: #eee; }
        table { border-collapse: collapse; background: #fff; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #aaa; padding: 2px; text-align: center; }
        
        /* ひし形エリア */
        .diamond-container { position: relative; width: 55px; height: 55px; border: 1px solid #666; margin: 2px auto; }
        
        /* 記録用ボックス共通 */
        .input-box { position: absolute; font-size: 8px; text-align: center; border: 1px solid #ccc; }
        .res-box { bottom: 2px; right: 2px; width: 40px; height: 18px; border-color: #d00; }
        .base-box { width: 16px; height: 14px; }
        .run-tr { top: 2px; right: 2px; } .run-tl { top: 2px; left: 2px; } .run-bl { bottom: 2px; left: 2px; }
        
        /* 下部クイックパネル */
        .quick-panel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
            background: #333; display: flex; flex-wrap: wrap; gap: 4px; padding: 5px; z-index: 1000;
        }
        .quick-btn { flex: 1 1 18%; height: 35px; font-size: 11px; cursor: pointer; border-radius: 4px; border: none; background: #fff; }
    </style>
</head>
<body>

<table>
    <script>
        for(let i=1; i<=9; i++) {
            document.write(`<tr><td style="width:20px; font-weight:bold;">${i}</td>`);
            for(let j=1; j<=9; j++) {
                document.write(`<td>
                    <div class="diamond-container">
                        <input type="text" id="r-${i}-${j}" class="input-box res-box save-data" placeholder="結果">
                        <input type="text" id="btr-${i}-${j}" class="input-box base-box run-tr save-data">
                        <input type="text" id="btl-${i}-${j}" class="input-box base-box run-tl save-data">
                        <input type="text" id="bbl-${i}-${j}" class="input-box base-box run-bl save-data">
                    </div>
                </td>`);
            }
            document.write(`</tr>`);
        }
    </script>
</table>

<!-- クイックパネル -->
<div class="quick-panel">
    <button class="quick-btn" onclick="quickFill('6-3')">6-3</button>
    <button class="quick-btn" onclick="quickFill('5-3')">5-3</button>
    <button class="quick-btn" onclick="quickFill('6-4-3')">6-4-3</button>
    <button class="quick-btn" onclick="quickFill('中安')">中安</button>
    <button class="quick-btn" onclick="quickFill('左安')">左安</button>
    <button class="quick-btn" onclick="quickFill('空三振')">空三振</button>
    <button class="quick-btn" onclick="quickFill('四球')">四球</button>
    <button class="quick-btn" onclick="quickFill('S')">盗塁</button>
    <button class="quick-btn" onclick="quickFill('WP')">暴投</button>
    <button class="quick-btn" onclick="quickFill('・')">・</button>
</div>

<script>
    let lastClickedCell = null;
    document.querySelectorAll('.save-data').forEach(el => {
        el.addEventListener('focus', () => { lastClickedCell = el; });
    });

    function quickFill(val) {
        if(lastClickedCell) {
            lastClickedCell.value = val;
            saveData();
        }
    }

    const saveData = () => {
        const data = {};
        document.querySelectorAll('.save-data').forEach(el => data[el.id] = el.value);
        localStorage.setItem('scoreData', JSON.stringify(data));
    };

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('scoreData') || '{}');
        Object.keys(saved).forEach(id => {
            const el = document.getElementById(id);
            if(el) el.value = saved[id];
        });
    };
</script>
</body>
</html>
